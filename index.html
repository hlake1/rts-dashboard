<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Guest Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(150deg, #1e1b4b 0%, #312e81 55%, #4c1d95 100%);
            min-height: 100vh;
            padding: 28px 20px 48px;
            color: #1f2937;
        }

        .container { max-width: 1280px; margin: 0 auto; }

        /* ── Header ─────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-brand { display: flex; align-items: center; gap: 14px; }
        .header-logo {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: url('https://yt3.googleusercontent.com/Yy_Zg2AmQ2ZEfwuwLjXFvlNW5JXJk0FmP-oFveW5oski8MPOCd7-RtAXEjAtTuFdA1iDfBNL=s900-c-k-c0x00ffffff-no-rj') center/cover;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            flex-shrink: 0;
        }
        .header-title { font-size: 1.35em; font-weight: 800; color: white; letter-spacing: -0.3px; }
        .header-sub { font-size: 0.78em; color: rgba(255,255,255,0.55); font-weight: 500; margin-top: 3px; letter-spacing: 0.2px; }
        .header-right { text-align: right; }
        .header-count { font-size: 0.82em; font-weight: 700; color: rgba(255,255,255,0.7); }
        .header-updated { font-size: 0.72em; color: rgba(255,255,255,0.4); margin-top: 3px; }

        /* ── Loading ─────────────────────────────────────────── */
        #loading { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.75); }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            width: 38px; height: 38px;
            animation: spin 0.75s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { font-size: 0.9em; font-weight: 500; }

        /* ── Content ─────────────────────────────────────────── */
        #content { display: none; }

        /* ── Stats + Refresh bar ─────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stats-cards { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 11px 18px;
            color: white;
            cursor: pointer;
            transition: all 0.18s;
            min-width: 90px;
            text-align: center;
            user-select: none;
        }
        .stat-card:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
        .stat-card.active { background: white; border-color: white; }
        .stat-value { font-size: 1.5em; font-weight: 800; display: block; line-height: 1.1; margin-bottom: 3px; }
        .stat-card.active .stat-value { color: #4f46e5; }
        .stat-label { font-size: 0.68em; font-weight: 600; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card.active .stat-label { color: #6366f1; opacity: 1; }

        .refresh-btn {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 9px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.82em;
            font-weight: 600;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.22); color: white; }
        .refresh-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── Section row ─────────────────────────────────────── */
        .section-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .section-label {
            font-size: 0.75em;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .guest-count-label {
            font-size: 0.75em;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        /* ── Guest grid ──────────────────────────────────────── */
        .guests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
        }

        /* ── Guest card ──────────────────────────────────────── */
        .guest-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.18s, box-shadow 0.18s;
            border: 1.5px solid #f1f0ff;
            display: flex;
            flex-direction: column;
        }
        .guest-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.15);
        }
        .guest-card.transformative {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.08), 0 2px 16px rgba(0,0,0,0.1);
        }

        /* Card actions */
        .card-actions {
            position: absolute;
            top: 14px; right: 14px;
            display: flex;
            gap: 6px;
        }
        .btn-icon {
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1.5px solid #e5e7eb;
            background: white;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            line-height: 1;
            padding: 0;
        }
        .btn-icon:hover { border-color: #a5b4fc; background: #f5f3ff; }
        .btn-fav.active { border-color: #fda4af; background: #fff1f2; }

        /* Narrative badge */
        .narrative-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 0.65em;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            width: fit-content;
        }

        /* Hook */
        .guest-hook {
            font-size: 0.83em;
            font-weight: 600;
            color: #6366f1;
            font-style: italic;
            margin-bottom: 6px;
            line-height: 1.4;
            padding-right: 72px;
        }

        /* Name */
        .guest-name {
            font-size: 0.97em;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
            line-height: 1.3;
            padding-right: 72px;
        }
        .guest-card:not(:has(.guest-hook)) .guest-name { padding-right: 72px; }

        /* Meta */
        .guest-meta {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .guest-date { font-size: 0.7em; color: #9ca3af; font-weight: 500; }
        .diff-badge {
            font-size: 0.67em;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.2px;
        }
        .diff-easy   { background: #d1fae5; color: #065f46; }
        .diff-medium { background: #fef3c7; color: #92400e; }
        .diff-hard   { background: #fee2e2; color: #991b1b; }

        /* Description */
        .guest-desc {
            font-size: 0.83em;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        /* Why RTS */
        .why-rts {
            background: #fafafe;
            border-left: 3px solid #6366f1;
            border-radius: 0 8px 8px 0;
            padding: 9px 12px;
            margin-bottom: 14px;
            flex: 1;
        }
        .why-label {
            font-size: 0.62em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: #6366f1;
            margin-bottom: 4px;
        }
        .why-text { font-size: 0.81em; color: #374151; line-height: 1.55; }

        /* Social links */
        .social-links {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            padding-top: 12px;
            border-top: 1px solid #f3f4f6;
            margin-top: auto;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 0.7em;
            font-weight: 600;
            color: #6366f1;
            background: #f5f3ff;
            border: 1px solid #e0e7ff;
            padding: 3px 9px;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.15s;
        }
        .social-link:hover { background: #6366f1; color: white; border-color: #6366f1; }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 48px 0;
            font-size: 0.9em;
            font-weight: 500;
        }

        /* ── Modal ───────────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,8,40,0.65);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 18px;
            padding: 28px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
        }
        .modal-title { font-size: 1.05em; font-weight: 700; color: #111827; margin-bottom: 4px; }
        .modal-guest-name { font-size: 0.82em; color: #6366f1; font-weight: 600; margin-bottom: 22px; display: block; }
        .reason-header { font-size: 0.72em; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
        .reason-buttons { display: grid; gap: 7px; margin-bottom: 14px; }
        .reason-btn {
            padding: 9px 14px;
            border: 1.5px solid #e5e7eb;
            background: white;
            border-radius: 9px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85em;
            font-weight: 500;
            text-align: left;
            transition: all 0.14s;
            color: #374151;
        }
        .reason-btn:hover { border-color: #a5b4fc; background: #f5f3ff; color: #4f46e5; }
        .reason-btn.selected { border-color: #6366f1; background: #6366f1; color: white; }
        .notes-label { font-size: 0.75em; font-weight: 600; color: #9ca3af; margin-bottom: 5px; display: block; }
        textarea {
            width: 100%;
            padding: 9px 11px;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-family: 'Inter', sans-serif;
            font-size: 0.84em;
            color: #374151;
            resize: vertical;
            margin-bottom: 16px;
            transition: border-color 0.15s;
        }
        textarea:focus { outline: none; border-color: #6366f1; }
        .modal-actions { display: flex; gap: 8px; }
        .btn-cancel {
            padding: 9px 16px;
            background: #f3f4f6; color: #374151;
            border: none; border-radius: 9px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600; font-size: 0.87em;
            transition: background 0.14s;
        }
        .btn-cancel:hover { background: #e5e7eb; }
        .btn-submit {
            padding: 9px 16px;
            background: #6366f1; color: white;
            border: none; border-radius: 9px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600; font-size: 0.87em;
            flex: 1;
            transition: background 0.14s;
        }
        .btn-submit:hover { background: #4f46e5; }
        .btn-submit:disabled { background: #d1d5db; cursor: not-allowed; }
        .status-msg { padding: 9px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.83em; font-weight: 500; display: none; }
        .status-msg.success { background: #d1fae5; color: #065f46; display: block; }
        .status-msg.error   { background: #fee2e2; color: #991b1b; display: block; }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 640px) {
            body { padding: 16px 12px 40px; }
            .header { flex-direction: column; align-items: flex-start; }
            .guests-grid { grid-template-columns: 1fr; }
            .stats-cards { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-brand">
            <div class="header-logo"></div>
            <div>
                <div class="header-title">Road To Success</div>
                <div class="header-sub">Guest Intelligence Dashboard</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-count" id="header-count"></div>
            <div class="header-updated" id="header-updated"></div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="loading-spinner"></div>
        <p>Loading guest research...</p>
    </div>

    <!-- Content -->
    <div id="content">

        <!-- Stats toolbar -->
        <div class="toolbar">
            <div class="stats-cards" id="stats-cards"></div>
            <button class="refresh-btn" id="refresh-btn" onclick="refreshDashboard()">🔄 Refresh</button>
        </div>

        <!-- Section label -->
        <div class="section-row">
            <span class="section-label" id="section-label"></span>
            <span class="guest-count-label" id="guest-count-label"></span>
        </div>

        <!-- Grid -->
        <div class="guests-grid" id="guests-grid"></div>
    </div>

</div>

<!-- Feedback Modal -->
<div id="feedbackModal" class="modal">
    <div class="modal-box">
        <div class="modal-title">Mark this guest</div>
        <span class="modal-guest-name" id="feedbackGuestLabel"></span>
        <div class="status-msg" id="statusMsg"></div>
        <div class="reason-header">Reason</div>
        <div class="reason-buttons">
            <button class="reason-btn" onclick="selectReason(this, 'Already booked')">Already booked</button>
            <button class="reason-btn" onclick="selectReason(this, 'Doesn\'t fit')">Doesn't fit</button>
            <button class="reason-btn" onclick="selectReason(this, 'Oversaturated')">Oversaturated</button>
        </div>
        <label class="notes-label">Notes (optional)</label>
        <textarea id="feedbackNotes" placeholder="Any extra context..." rows="3"></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeFeedbackModal()">Cancel</button>
            <button class="btn-submit" id="feedbackSubmitBtn" onclick="submitFeedback()" disabled>Save feedback</button>
        </div>
    </div>
</div>

<script>
    // ── Data ────────────────────────────────────────────────────────────────
    var GUESTS = [
        {
            name: "Jeffrey Pang (RUN! Motorsports & Media)",
            hook: "🏎️ From Chaos to Drift Dreams: How I Found Myself in Japan",
            desc: "YouTube automotive creator with 264K followers. Drift culture, JDM car builds, cinematic storytelling — based in Japan.",
            insight: "Niche enough to be under-booked but big enough to bring viewers. Story-driven narrative with zero podcast saturation. Built his dream through persistence — authentic RTS angle.",
            dateAdded: "2026-06-09", narrative: true, diff: 4,
            yt: "https://www.youtube.com/@run_jeff", ig: "", tw: "", web: ""
        },
        {
            name: "Hoovie (Tyler Hoover)",
            hook: "🔥 Exotic Car Chaos: From $500 Finds to $50K Flips",
            desc: "YouTube automotive entertainer with 2.1M followers. Buys cheap exotic cars and documents the restoration and flip process.",
            insight: "Unmatched entertainment value combined with real business storytelling. Zero podcast appearances despite a massive, loyal audience.",
            dateAdded: "2026-06-04", diff: 5,
            yt: "https://www.youtube.com/@hooviesgarage", ig: "https://www.instagram.com/hooviegarage", tw: "", web: ""
        },
        {
            name: "Engineering Explained (Jason Fenske)",
            hook: "⚙️ Making Impossible Car Tech Actually Understandable",
            desc: "Technical automotive educator explaining complex car mechanics in an accessible way. 1.5M YouTube followers.",
            insight: "Deep credibility with a natural educator style. Conversational deep-dive potential on EV tech, engine design. Highest booking success rate of all candidates.",
            dateAdded: "2026-06-04", diff: 3,
            yt: "https://www.youtube.com/@EngineeringExplained", ig: "", tw: "https://twitter.com/fenskejason", web: ""
        },
        {
            name: "Lord Aleem",
            hook: "👑 From Birmingham Teenager to Dubai's Supercar King",
            desc: "British-Pakistani entrepreneur who built one of the UK and Middle East's biggest supercar rental empires starting as a teenager. Now Dubai-based running a multi-million pound luxury car operation.",
            insight: "Young, self-made, immigrant-heritage entrepreneur — exactly the RTS demographic sweet spot. His Cars & Money appearance (203K views) proves the appetite. NOT yet on RTS.",
            dateAdded: "2026-06-09", narrative: true, diff: 6,
            yt: "https://www.youtube.com/@LordAleem", ig: "https://www.instagram.com/lord_aleem/", tw: "", web: ""
        },
        {
            name: "Supercar Blondie (Alex Hirschi)",
            hook: "🌟 From Brisbane Radio to Running the World's Biggest Car Media Empire",
            desc: "Australian-born broadcaster who moved to Dubai and became the world's most followed car creator. 30M+ social followers. Founder of SBX Cars, a high-end supercar auction platform.",
            insight: "Unique angle: female entrepreneur who broke into a completely male space, in a foreign country, with zero car expertise — and became the #1 player globally. NOT on RTS.",
            dateAdded: "2026-06-09", narrative: true, diff: 8,
            yt: "https://www.youtube.com/@SupercarBlondie", ig: "https://www.instagram.com/supercarblondie/", tw: "", web: "https://sbxcars.com"
        },
        {
            name: "Throttle House (Jonny & Jezza)",
            hook: "🎬 Two Best Friends Breaking Every Car Review Rulebook",
            desc: "Two independent car reviewers with proven chemistry and storytelling. 600K followers and authentic automotive commentary.",
            insight: "Natural long-form chemistry, independent creators (not a big studio). Reviews plus personality mix. Niche UK automotive voice that suits the RTS audience.",
            dateAdded: "2026-06-04", diff: 6,
            yt: "https://www.youtube.com/@ThrottleHouse", ig: "https://www.instagram.com/thethrottlehouse", tw: "", web: ""
        },
        {
            name: "Donut Media (Jared & James)",
            hook: "🎥 The Most Entertaining Car Education on YouTube",
            desc: "High-production automotive education channel blending entertainment with car knowledge. 3.5M YouTube followers.",
            insight: "Entertainment-first approach with a massive loyal audience. Under-tapped on the podcast circuit despite huge reach.",
            dateAdded: "2026-06-04", diff: 7,
            yt: "https://www.youtube.com/@DonutMediaOfficial", ig: "https://www.instagram.com/donutmedia", tw: "", web: ""
        },
        {
            name: "Straight Pipes (Yuri & Jacob)",
            hook: "🍁 Canadians Giving Cars Honest Ratings Others Won't",
            desc: "Canadian car reviewers with honest opinions and great chemistry. 600K followers with a loyal, engaged fanbase.",
            insight: "Authentic voices with a dedicated audience. Review-first approach Ben could explore. Zero podcast saturation.",
            dateAdded: "2026-06-04", diff: 6,
            yt: "https://www.youtube.com/@TheStraightPipes", ig: "", tw: "", web: ""
        },
        {
            name: "Skip Barber Racing School",
            hook: "🏁 50 Years Teaching Legends How to Actually Win",
            desc: "Legendary racing school founded in 1975 teaching professional racing techniques. An established institution with deep expertise.",
            insight: "Insider racing education perspective. Could explore what makes a professional driver. Establishment credibility plus practical insight.",
            dateAdded: "2026-06-04", diff: 7,
            yt: "https://www.youtube.com/@skipbarber", ig: "", tw: "", web: "https://www.skipbarber.com"
        }
    ];

    // ── State ───────────────────────────────────────────────────────────────
    var activeFilter = 'all';
    var currentFeedbackGuest = null;
    var selectedReason = null;

    // ── Helpers ─────────────────────────────────────────────────────────────
    function getFavourites() {
        return JSON.parse(localStorage.getItem('rtsFavourites') || '[]');
    }

    function diffInfo(diff) {
        var d = parseInt(diff, 10);
        if (d <= 3) return { cls: 'diff-easy',   label: 'Easy to book' };
        if (d <= 6) return { cls: 'diff-medium', label: 'Medium'       };
        return             { cls: 'diff-hard',   label: 'Hard to book' };
    }

    // ── Filter ──────────────────────────────────────────────────────────────
    function setFilter(filter) {
        activeFilter = filter;
        loadDashboard();
    }

    // ── Favourites ──────────────────────────────────────────────────────────
    function toggleFavourite(guestName) {
        var favs = getFavourites();
        var idx = favs.indexOf(guestName);
        if (idx > -1) { favs.splice(idx, 1); } else { favs.push(guestName); }
        localStorage.setItem('rtsFavourites', JSON.stringify(favs));
        loadDashboard();
    }

    // ── Render card ─────────────────────────────────────────────────────────
    function renderCard(g, isFav) {
        var safe  = g.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var di    = diffInfo(g.diff);
        var socials = '';
        if (g.yt)  socials += '<a href="' + g.yt  + '" target="_blank" rel="noopener" class="social-link">▶ YouTube</a>';
        if (g.ig)  socials += '<a href="' + g.ig  + '" target="_blank" rel="noopener" class="social-link">📸 Instagram</a>';
        if (g.tw)  socials += '<a href="' + g.tw  + '" target="_blank" rel="noopener" class="social-link">𝕏 Twitter</a>';
        if (g.web) socials += '<a href="' + g.web + '" target="_blank" rel="noopener" class="social-link">🌐 Website</a>';

        return '<div class="guest-card' + (g.narrative ? ' transformative' : '') + '">' +
            '<div class="card-actions">' +
                '<button class="btn-icon btn-fav' + (isFav ? ' active' : '') + '" onclick="toggleFavourite(\'' + safe + '\')" title="' + (isFav ? 'Remove favourite' : 'Add to favourites') + '">' + (isFav ? '❤️' : '🤍') + '</button>' +
                '<button class="btn-icon" onclick="openFeedbackModal(\'' + safe + '\')" title="Mark this guest">👎</button>' +
            '</div>' +
            (g.narrative ? '<span class="narrative-badge">⭐ Transformative Story</span>' : '') +
            (g.hook ? '<div class="guest-hook">' + g.hook + '</div>' : '') +
            '<div class="guest-name">' + g.name + '</div>' +
            '<div class="guest-meta">' +
                '<span class="guest-date">Added ' + g.dateAdded + '</span>' +
                '<span class="diff-badge ' + di.cls + '">' + di.label + ' · ' + g.diff + '/10</span>' +
            '</div>' +
            '<p class="guest-desc">' + g.desc + '</p>' +
            '<div class="why-rts"><div class="why-label">Why RTS</div><div class="why-text">' + g.insight + '</div></div>' +
            (socials ? '<div class="social-links">' + socials + '</div>' : '') +
        '</div>';
    }

    // ── Load dashboard ──────────────────────────────────────────────────────
    function loadDashboard() {
        var favs = getFavourites();
        var easyCount = GUESTS.filter(function(g) { return parseInt(g.diff, 10) <= 5; }).length;

        // Stats bar
        var statsData = [
            { key: 'all',        label: 'All Guests',   value: GUESTS.length  },
            { key: 'favourites', label: 'Favourites',   value: favs.length    },
            { key: 'easy',       label: 'Easy to Book', value: easyCount      }
        ];
        document.getElementById('stats-cards').innerHTML = statsData.map(function(s) {
            return '<div class="stat-card' + (activeFilter === s.key ? ' active' : '') + '" onclick="setFilter(\'' + s.key + '\')">' +
                '<span class="stat-value">' + s.value + '</span>' +
                '<span class="stat-label">' + s.label + '</span>' +
            '</div>';
        }).join('');

        // Filter visible guests
        var visible = GUESTS.filter(function(g) {
            if (activeFilter === 'favourites') return favs.includes(g.name);
            if (activeFilter === 'easy')       return parseInt(g.diff, 10) <= 5;
            return true;
        });

        // Section label
        var labels = { all: 'All Guests', favourites: '❤️ Favourites', easy: '✅ Easy to Book' };
        document.getElementById('section-label').textContent = labels[activeFilter];
        document.getElementById('guest-count-label').textContent = visible.length + ' guest' + (visible.length !== 1 ? 's' : '');

        // Header count
        document.getElementById('header-count').textContent = GUESTS.length + ' guests researched';

        // Render grid
        var grid = document.getElementById('guests-grid');
        if (visible.length === 0) {
            grid.innerHTML = '<div class="empty-state">No guests in this view yet.</div>';
        } else {
            grid.innerHTML = visible.map(function(g) { return renderCard(g, favs.includes(g.name)); }).join('');
        }

        // Show content, update timestamp
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        var now = new Date();
        var ts = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('header-updated').textContent = 'Updated ' + ts;
    }

    // ── Refresh ─────────────────────────────────────────────────────────────
    function refreshDashboard() {
        var btn = document.getElementById('refresh-btn');
        btn.disabled = true;
        btn.textContent = '⏳ Refreshing...';
        setTimeout(function() {
            loadDashboard();
            btn.disabled = false;
            btn.textContent = '🔄 Refresh';
        }, 600);
    }

    // ── Feedback modal ───────────────────────────────────────────────────────
    function openFeedbackModal(guestName) {
        currentFeedbackGuest = guestName;
        selectedReason = null;
        document.getElementById('feedbackGuestLabel').textContent = guestName;
        document.getElementById('feedbackNotes').value = '';
        document.getElementById('statusMsg').className = 'status-msg';
        document.getElementById('feedbackSubmitBtn').disabled = true;
        document.querySelectorAll('.reason-btn').forEach(function(b) { b.classList.remove('selected'); });
        document.getElementById('feedbackModal').classList.add('show');
    }

    function closeFeedbackModal() {
        document.getElementById('feedbackModal').classList.remove('show');
    }

    function selectReason(btn, reason) {
        selectedReason = reason;
        document.querySelectorAll('.reason-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        document.getElementById('feedbackSubmitBtn').disabled = false;
    }

    function submitFeedback() {
        if (!selectedReason || !currentFeedbackGuest) return;
        var notes     = document.getElementById('feedbackNotes').value;
        var statusMsg = document.getElementById('statusMsg');
        var submitBtn = document.getElementById('feedbackSubmitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        try {
            var feedback = JSON.parse(localStorage.getItem('rtsFeedback') || '[]');
            feedback.push({ guest: currentFeedbackGuest, reason: selectedReason, notes: notes, timestamp: new Date().toISOString() });
            localStorage.setItem('rtsFeedback', JSON.stringify(feedback));
            statusMsg.className = 'status-msg success';
            statusMsg.textContent = '✅ Feedback saved!';
            setTimeout(closeFeedbackModal, 1200);
        } catch(e) {
            statusMsg.className = 'status-msg error';
            statusMsg.textContent = '❌ Error saving feedback';
        } finally {
            submitBtn.textContent = 'Save feedback';
            submitBtn.disabled = false;
        }
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeFeedbackModal(); });

    // ── Boot ─────────────────────────────────────────────────────────────────
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadDashboard);
    } else {
        loadDashboard();
    }
</script>
</body>
</html>
