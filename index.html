<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Podcast Research — Guest Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        #loading { text-align: center; padding: 60px 20px; color: white; }
        .loading-spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #content { display: none; }
        .guests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin: 20px 0; }
        .guest-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .guest-card h3 { color: #667eea; margin-bottom: 10px; }
        .guest-card .desc { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        .guest-card .insight { font-size: 0.85em; color: #555; background: #f5f5f5; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .guest-card .date { font-size: 0.75em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Road To Success — Guest Research</h1>
            <p>Carefully curated podcast guest recommendations</p>
        </header>

        <div id="loading">
            <div class="loading-spinner"></div>
            <p>Loading guest research...</p>
        </div>

        <div id="content">
            <h2 style="color: white; margin-bottom: 20px;">📅 Recommended Guests</h2>
            <div class="guests-grid" id="guests-grid"></div>
        </div>
    </div>

    <script>
        // Wait for DOM to be ready
        function loadDashboard() {
            console.log('[Dashboard] Starting load...');
            
            const GUESTS = [
                { name: "Jeffrey Pang (RUN! Motorsports & Media)", desc: "YouTube automotive creator with 264K followers", insight: "Niche enough to be under-booked but big enough to bring viewers. Zero podcast saturation.", dateAdded: "2026-06-09" },
                { name: "Hoovie (Tyler Hoover)", desc: "YouTube entertainer with 2.1M followers, buys exotic cars", insight: "Unmatched entertainment value despite massive audience having zero podcast appearances", dateAdded: "2026-06-04" },
                { name: "Engineering Explained (Jason Fenske)", desc: "Technical educator explaining car mechanics. 1.5M YouTube followers", insight: "Deep credibility with natural educator style. Highest booking success rate.", dateAdded: "2026-06-04" },
                { name: "Lord Aleem", desc: "British entrepreneur who built Dubai's supercar rental empire, starting as teenager", insight: "Young, self-made, immigrant-heritage entrepreneur — exactly RTS demographic. NOT yet on RTS.", dateAdded: "2026-06-09" },
                { name: "Supercar Blondie (Alex Hirschi)", desc: "30M+ social followers, built global automotive media empire. Founded SBX Cars auction platform.", insight: "Female entrepreneur who broke into male-dominated space in foreign country. Unique angle.", dateAdded: "2026-06-09" },
            ];

            console.log('[Dashboard] GUESTS loaded:', GUESTS.length);

            const grid = document.getElementById('guests-grid');
            const html = GUESTS.map(g => `
                <div class="guest-card">
                    <h3>${g.name}</h3>
                    <p class="desc">${g.desc}</p>
                    <div class="insight"><strong>Why:</strong> ${g.insight}</div>
                    <p class="date">Added: ${g.dateAdded}</p>
                </div>
            `).join('');

            grid.innerHTML = html;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            console.log('[Dashboard] Render complete!');
        }

        // Trigger on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadDashboard);
        }
        window.addEventListener('load', loadDashboard);
        
        // Fallback
        setTimeout(loadDashboard, 500);
    </script>
</body>
</html>
