<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Podcast Research — Guest Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        .section-header { color: white; font-size: 1.5em; margin: 30px 0 20px 0; }

        #loading { text-align: center; padding: 60px 20px; color: white; }
        .loading-spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #content { display: none; }

        .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 14px 20px; color: white; cursor: pointer; transition: background 0.2s; flex: 1; min-width: 100px; text-align: center; border: 2px solid transparent; }
        .stat-card:hover { background: rgba(255,255,255,0.3); }
        .stat-card.active { background: white; color: #667eea; border-color: white; }
        .stat-card.active .stat-value { color: #667eea; }
        .stat-card.active .stat-label { color: #888; }
        .stat-value { font-size: 1.8em; font-weight: 700; display: block; }
        .stat-label { font-size: 0.8em; opacity: 0.85; margin-top: 2px; display: block; }
        .stat-card.active .stat-label { opacity: 1; }

        .guests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin: 20px 0; }

        .guest-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            padding-top: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            transition: transform 0.2s;
        }
        .guest-card:hover { transform: translateY(-4px); }
        .guest-card.transformative { border: 2px solid #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.12), 0 10px 30px rgba(0,0,0,0.2); }
        .narrative-badge { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 0.7em; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 0.4px; }
        .guest-card h3 { color: #667eea; margin-bottom: 8px; font-size: 1em; }
        .guest-card .date { font-size: 0.75em; color: #999; margin-bottom: 10px; display: block; }
        .guest-card .desc { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        .guest-card .insight { font-size: 0.85em; color: #555; background: #f5f5f5; padding: 10px; border-radius: 5px; margin-bottom: 12px; line-height: 1.4; }
        .guest-card .difficulty { font-size: 0.85em; color: #667eea; font-weight: 600; }

        .action-buttons { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
        .btn-action { background: none; border: none; font-size: 1.4em; cursor: pointer; line-height: 1; padding: 2px; }
        .btn-fav { opacity: 1; background: white; border: 2px solid #ddd !important; border-radius: 6px; padding: 3px 5px !important; transition: border-color 0.2s, transform 0.1s; }
        .btn-fav:hover { border-color: #e75480 !important; }
        .btn-fav.active { border-color: #e75480 !important; background: #fff0f3; transform: scale(1.1); }
        .btn-feedback { opacity: 0.4; transition: opacity 0.2s; }
        .btn-feedback:hover { opacity: 1; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 30px; max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal h2 { color: #333; margin-bottom: 6px; font-size: 1.2em; }
        .modal .guest-label { color: #667eea; font-weight: 600; font-size: 0.9em; margin-bottom: 20px; display: block; }
        .reason-buttons { display: grid; gap: 8px; margin-bottom: 16px; }
        .reason-btn { padding: 10px 14px; border: 2px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 0.9em; text-align: left; }
        .reason-btn:hover { border-color: #667eea; }
        .reason-btn.selected { border-color: #667eea; background: #667eea; color: white; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 0.9em; resize: vertical; margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 10px; }
        .btn-cancel { padding: 10px 20px; background: #eee; color: #333; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-cancel:hover { background: #ddd; }
        .btn-submit { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; transition: background 0.2s; }
        .btn-submit:hover { background: #5568d3; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .status-msg { padding: 10px; border-radius: 8px; margin-bottom: 14px; text-align: center; display: none; font-size: 0.9em; }
        .status-msg.success { background: #d4edda; color: #155724; display: block; }
        .status-msg.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Road To Success — Guest Research</h1>
            <p>Carefully curated podcast guest recommendations</p>
        </header>

        <div id="loading">
            <div class="loading-spinner"></div>
            <p>Loading guest research...</p>
        </div>

        <div id="content">
            <div class="stats-bar" id="stats-bar"></div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
                <h2 class="section-header" id="section-label" style="margin:0;">📅 All Guests</h2>
                <div style="display:flex; align-items:center; gap:14px;">
                    <span id="last-updated" style="color:rgba(255,255,255,0.7); font-size:0.85em;"></span>
                    <button id="refresh-btn" onclick="refreshDashboard()" style="background:white; color:#667eea; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-size:0.85em; transition:opacity 0.2s;">🔄 Refresh</button>
                </div>
            </div>
            <div class="guests-grid" id="guests-grid"></div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <h2>Mark this guest</h2>
            <span class="guest-label" id="feedbackGuestLabel"></span>
            <div class="status-msg" id="statusMsg"></div>
            <p style="font-weight:600; margin-bottom:10px; font-size:0.9em;">Reason:</p>
            <div class="reason-buttons">
                <button class="reason-btn" onclick="selectReason(this, 'Already booked')">Already booked</button>
                <button class="reason-btn" onclick="selectReason(this, 'Doesnt fit')">Doesn't fit</button>
                <button class="reason-btn" onclick="selectReason(this, 'Oversaturated')">Oversaturated</button>
            </div>
            <textarea id="feedbackNotes" placeholder="Optional notes..." rows="3"></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeFeedbackModal()">Cancel</button>
                <button class="btn-submit" id="feedbackSubmitBtn" onclick="submitFeedback()" disabled>Submit</button>
            </div>
        </div>
    </div>

    <script>
        // ── Data ──────────────────────────────────────────────────────────────
        const GUESTS = [
            { name: "Jeffrey Pang (RUN! Motorsports & Media)", desc: "YouTube automotive creator with 264K followers. Drift culture, JDM builds, cinematic storytelling based in Japan.", insight: "Niche enough to be under-booked but big enough to bring viewers. Zero podcast saturation. Story-driven narrative.", dateAdded: "2026-06-09", narrative: true, diff: 4 },
            { name: "Hoovie (Tyler Hoover)", desc: "YouTube automotive entertainer with 2.1M followers. Buys cheap exotic cars and documents the restoration/flip process.", insight: "Unmatched entertainment value + business storytelling. Zero podcast appearances despite massive audience.", dateAdded: "2026-06-04", diff: 5 },
            { name: "Engineering Explained (Jason Fenske)", desc: "Technical automotive educator explaining complex car mechanics accessibly. 1.5M YouTube followers.", insight: "Deep credibility + conversational deep-dive potential. Natural educator. Highest booking success rate.", dateAdded: "2026-06-04", diff: 3 },
            { name: "Lord Aleem", desc: "British-Pakistani entrepreneur from Birmingham who built one of the UK and Middle East's biggest supercar rental empires, starting as a teenager. Now Dubai-based.", insight: "Young, self-made, immigrant-heritage entrepreneur — exactly the RTS demographic sweet spot. NOT yet on RTS.", dateAdded: "2026-06-09", narrative: true, diff: 6 },
            { name: "Supercar Blondie (Alex Hirschi)", desc: "Australian-born broadcaster turned global automotive media mogul. 30M+ social followers. Founded SBX Cars, a high-end supercar auction platform.", insight: "Unique angle: female entrepreneur who broke into a male space in a foreign country with zero car expertise. NOT on RTS.", dateAdded: "2026-06-09", narrative: true, diff: 8 },
        ];

        // ── Filter state ──────────────────────────────────────────────────────
        var activeFilter = 'all';

        function setFilter(filter) {
            activeFilter = filter;
            loadDashboard();
        }

        // ── Favourites ────────────────────────────────────────────────────────
        function getFavourites() {
            return JSON.parse(localStorage.getItem('rtsFavourites') || '[]');
        }

        function toggleFavourite(guestName) {
            const favs = getFavourites();
            const idx = favs.indexOf(guestName);
            if (idx > -1) {
                favs.splice(idx, 1);
            } else {
                favs.push(guestName);
            }
            localStorage.setItem('rtsFavourites', JSON.stringify(favs));
            loadDashboard();
        }

        // ── Render ────────────────────────────────────────────────────────────
        function loadDashboard() {
            const favs = getFavourites();

            // Stats bar
            var totalFavs = favs.length;
            var statsBar = document.getElementById('stats-bar');
            var stats = [
                { key: 'all',       label: 'All Guests',  value: GUESTS.length },
                { key: 'favourites', label: 'Favourites',  value: totalFavs },
                { key: 'easy',      label: 'Easy to Book', value: GUESTS.filter(function(g){ return g.diff <= 5; }).length },
            ];
            statsBar.innerHTML = stats.map(function(s) {
                return '<div class="stat-card' + (activeFilter === s.key ? ' active' : '') + '" onclick="setFilter(\'' + s.key + '\')">' +
                    '<span class="stat-value">' + s.value + '</span>' +
                    '<span class="stat-label">' + s.label + '</span>' +
                    '</div>';
            }).join('');

            // Section label
            var labels = { all: '📅 All Guests', favourites: '❤️ Favourites', easy: '✅ Easy to Book' };
            document.getElementById('section-label').textContent = labels[activeFilter];

            // Filter guests
            var visible = GUESTS.filter(function(g) {
                if (activeFilter === 'favourites') return favs.includes(g.name);
                if (activeFilter === 'easy') return g.diff <= 5;
                return true;
            });

            const grid = document.getElementById('guests-grid');

            if (visible.length === 0) {
                grid.innerHTML = '<p style="color:white;opacity:0.8;padding:20px 0;">No guests in this view yet.</p>';
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                return;
            }

            grid.innerHTML = visible.map(function(g) {
                const isFav = favs.includes(g.name);
                const safe  = g.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                return [
                    '<div class="guest-card' + (g.narrative ? ' transformative' : '') + '">',
                    '  <div class="action-buttons">',
                    '    <button class="btn-action btn-fav' + (isFav ? ' active' : '') + '" onclick="toggleFavourite(\'' + safe + '\')" title="' + (isFav ? 'Remove favourite' : 'Add favourite') + '">' + (isFav ? '❤️' : '🤍') + '</button>',
                    '    <button class="btn-action btn-feedback" onclick="openFeedbackModal(\'' + safe + '\')" title="Mark this guest">👎</button>',
                    '  </div>',
                    (g.narrative ? '  <span class="narrative-badge">⭐ Transformative Story</span>' : ''),
                    '  <h3>' + g.name + '</h3>',
                    '  <span class="date">Added ' + g.dateAdded + '</span>',
                    '  <p class="desc">' + g.desc + '</p>',
                    '  <div class="insight"><strong>Why RTS:</strong> ' + g.insight + '</div>',
                    '  <p class="difficulty">Booking difficulty: ' + g.diff + '/10</p>',
                    '</div>'
                ].join('\n');
            }).join('\n');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            updateTimestamp();
        }

        function updateTimestamp() {
            var now = new Date();
            var time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('last-updated').textContent = 'Last updated ' + time;
        }

        // ── Feedback Modal ────────────────────────────────────────────────────
        var currentFeedbackGuest = null;
        var selectedReason = null;

        function openFeedbackModal(guestName) {
            currentFeedbackGuest = guestName;
            selectedReason = null;
            document.getElementById('feedbackGuestLabel').textContent = guestName;
            document.getElementById('feedbackNotes').value = '';
            document.getElementById('statusMsg').className = 'status-msg';
            document.getElementById('feedbackSubmitBtn').disabled = true;
            document.querySelectorAll('.reason-btn').forEach(function(b) { b.classList.remove('selected'); });
            document.getElementById('feedbackModal').classList.add('show');
        }

        function closeFeedbackModal() {
            document.getElementById('feedbackModal').classList.remove('show');
        }

        function selectReason(btn, reason) {
            selectedReason = reason;
            document.querySelectorAll('.reason-btn').forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            document.getElementById('feedbackSubmitBtn').disabled = false;
        }

        function submitFeedback() {
            if (!selectedReason || !currentFeedbackGuest) return;
            var notes = document.getElementById('feedbackNotes').value;
            var statusMsg = document.getElementById('statusMsg');
            var submitBtn = document.getElementById('feedbackSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            try {
                var feedback = JSON.parse(localStorage.getItem('rtsFeedback') || '[]');
                feedback.push({ guest: currentFeedbackGuest, reason: selectedReason, notes: notes, timestamp: new Date().toISOString() });
                localStorage.setItem('rtsFeedback', JSON.stringify(feedback));
                statusMsg.className = 'status-msg success';
                statusMsg.textContent = '✅ Feedback saved!';
                setTimeout(closeFeedbackModal, 1200);
            } catch(e) {
                statusMsg.className = 'status-msg error';
                statusMsg.textContent = '❌ Error saving feedback';
            } finally {
                submitBtn.textContent = 'Submit';
                submitBtn.disabled = false;
            }
        }

        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeFeedbackModal(); });

        // ── Refresh ───────────────────────────────────────────────────────────
        function refreshDashboard() {
            var btn = document.getElementById('refresh-btn');
            btn.textContent = '⏳ Refreshing...';
            btn.disabled = true;
            setTimeout(function() {
                loadDashboard();
                btn.textContent = '🔄 Refresh';
                btn.disabled = false;
            }, 600);
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadDashboard);
        } else {
            loadDashboard();
        }
    </script>
</body>
</html>
