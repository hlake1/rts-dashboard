<body>
    <div class="container">
        <header>
            <h1>🎙️ Road to Success Podcast</h1>
            <p>Guest Booking Dashboard & Analytics</p>
        </header>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading your podcast data...</p>
        </div>

        <div id="content" style="display: none;">
            <div class="status-bar" id="statusBar"></div>

            <div class="dashboard-grid">
                <div class="card">
                    <h2>📊 Guest Pipeline</h2>
                    <div class="guest-list" id="guestPipeline"></div>
                    <button class="refresh-btn" onclick="refreshDashboard()" id="refreshBtn">🔄 Refresh Data</button>
                </div>

                <div class="card">
                    <h2>📈 Key Metrics</h2>
                    <div class="metrics" id="metrics"></div>
                </div>

                <div class="card">
                    <h2>✅ Booking Progress</h2>
                    <div id="bookingProgress" style="padding: 20px 0;"></div>
                </div>

                <div class="card">
                    <h2>🎯 Next Actions</h2>
                    <div id="nextActions" style="padding: 20px 0;"></div>
                </div>
            </div>
        </div>

        <div id="error" style="display: none;"></div>

        <div class="footer">
            <p>Last updated: <span id="lastUpdate">—</span></p>
            <p>Data synced from Google Sheets</p>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            apiKey: 'YOUR_API_KEY_HERE',
            sheetId: '1XB8ulplXEpakKWeXQtU2IO25LCrvNY4qdaDGy4chVkE',
            matolUrl: 'https://api.maton.ai/google-sheets/v4/spreadsheets'
        };

        // Fetch data from Google Sheet
        async function fetchSheetData(sheetName, range = 'A:Z') {
            try {
                const safeRange = encodeURIComponent(`'${sheetName}'!${range}`);
                const url = `${CONFIG.matolUrl}/${CONFIG.sheetId}/values/${safeRange}`;
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${CONFIG.apiKey}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                return data.values || [];
            } catch (error) {
                console.error(`Error fetching ${sheetName}:`, error);
                throw error;
            }
        }

        // Parse CSV rows into objects
        function parseGuestData(rows) {
            if (rows.length < 2) return [];
            
            const headers = rows[0];
            return rows.slice(1).map(row => {
                const guest = {};
                headers.forEach((header, i) => {
                    guest[header] = row[i] || '';
                });
                return guest;
            }).filter(g => g['Guest Name']); // Filter empty rows
        }

        // Determine status color
        function getStatusClass(status) {
            const lower = status?.toLowerCase() || '';
            if (lower.includes('booked') || lower.includes('confirmed')) return 'status-booked';
            if (lower.includes('contacted') || lower.includes('reached')) return 'status-contacted';
            return 'status-pending';
        }

        // Format guest list
        function formatGuestList(guests) {
            const tiers = {};
            guests.forEach(g => {
                const tier = g.Tier || 'Other';
                if (!tiers[tier]) tiers[tier] = [];
                tiers[tier].push(g);
            });

            return Object.entries(tiers).map(([tier, tierGuests]) => `
                <div class="tier-section">
                    <div class="tier-header">⭐ ${tier}</div>
                    ${tierGuests.slice(0, 8).map(guest => `
                        <div class="guest-item">
                            <div class="guest-info">
                                <span class="guest-name">${guest['Guest Name'] || 'Unknown'}</span>
                                ${guest.Platform ? `<span class="guest-platform">${guest.Platform}</span>` : ''}
                            </div>
                            <span class="guest-status ${getStatusClass(guest.Status)}">
                                ${guest.Status || 'Not Started'}
                            </span>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        // Calculate metrics
        function calculateMetrics(guests) {
            const total = guests.length;
            const booked = guests.filter(g => g.Status?.toLowerCase().includes('booked')).length;
            const contacted = guests.filter(g => g.Status?.toLowerCase().includes('contacted') && !g.Status?.toLowerCase().includes('booked')).length;
            const pending = guests.filter(g => !g.Status || g.Status === 'Not Started').length;
            const conversionRate = total > 0 ? Math.round((booked / total) * 100) : 0;

            return { total, booked, contacted, pending, conversionRate };
        }

        // Format metrics display
        function formatMetrics(metrics) {
            return `
                <div class="metric">
                    <div class="metric-label">Total Prospects</div>
                    <div class="metric-value">${metrics.total}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Booked</div>
                    <div class="metric-value">${metrics.booked}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Contacted</div>
                    <div class="metric-value">${metrics.contacted}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Conversion Rate</div>
                    <div class="metric-value">${metrics.conversionRate}%</div>
                </div>
            `;
        }

        // Format booking progress
        function formatBookingProgress(guests) {
            const metrics = calculateMetrics(guests);
            const progressPercent = metrics.total > 0 ? Math.round((metrics.booked / metrics.total) * 100) : 0;

            return `
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <strong>Booking Progress</strong>
                        <span style="color: #667eea; font-weight: 600;">${metrics.booked}/${metrics.total}</span>
                    </div>
                    <div style="background: #e9ecef; border-radius: 10px; height: 20px; overflow: hidden;">
                        <div style="background: linear-gradient(90deg, #667eea, #764ba2); width: ${progressPercent}%; height: 100%; transition: width 0.3s;"></div>
                    </div>
                    <div style="text-align: center; margin-top: 8px; color: #667eea; font-weight: 600;">
                        ${progressPercent}% Complete
                    </div>
                </div>

                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <div style="color: #666; font-size: 0.9em;">This Month</div>
                            <div style="font-size: 1.5em; font-weight: bold; color: #155724;">+${Math.max(0, metrics.booked - 2)}</div>
                        </div>
                        <div>
                            <div style="color: #666; font-size: 0.9em;">Target</div>
                            <div style="font-size: 1.5em; font-weight: bold; color: #667eea;">${Math.max(3, Math.ceil(metrics.total * 0.4))}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Format next actions
        function formatNextActions(guests) {
            const pending = guests.filter(g => !g.Status || g.Status === 'Not Started').slice(0, 5);
            const nextAction = guests.filter(g => g['Next Action']).slice(0, 3);

            return `
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
                    <strong style="display: block; margin-bottom: 10px;">Priority Follow-ups</strong>
                    ${pending.length > 0 ? `
                        <ul style="margin-left: 20px; color: #333;">
                            ${pending.map(g => `
                                <li style="margin-bottom: 8px;">
                                    <strong>${g['Guest Name']}</strong>
                                    ${g['Contact Method'] ? `<br><span style="color: #999; font-size: 0.85em;">${g['Contact Method']}</span>` : ''}
                                </li>
                            `).join('')}
                        </ul>
                    ` : '<p style="color: #999;">No pending contacts</p>'}
                </div>
            `;
        }

        // Main dashboard initialization
        async function initDashboard() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('content').style.display = 'none';
                document.getElementById('error').style.display = 'none';

                // Fetch guest pipeline
                const guestData = parseGuestData(await fetchSheetData('Guest Pipeline'));
                const metrics = calculateMetrics(guestData);

                // Update status bar
                document.getElementById('statusBar').innerHTML = `
                    <div class="status-card">
                        <h3>Total Prospects</h3>
                        <div class="value">${metrics.total}</div>
                        <div class="subtitle">in pipeline</div>
                    </div>
                    <div class="status-card">
                        <h3>Booked</h3>
                        <div class="value">${metrics.booked}</div>
                        <div class="subtitle">confirmed guests</div>
                    </div>
                    <div class="status-card">
                        <h3>Conversion Rate</h3>
                        <div class="value">${metrics.conversionRate}%</div>
                        <div class="subtitle">success rate</div>
                    </div>
                    <div class="status-card">
                        <h3>In Progress</h3>
                        <div class="value">${metrics.contacted}</div>
                        <div class="subtitle">active outreach</div>
                    </div>
                `;

                // Update displays
                document.getElementById('guestPipeline').innerHTML = formatGuestList(guestData);
                document.getElementById('metrics').innerHTML = formatMetrics(metrics);
                document.getElementById('bookingProgress').innerHTML = formatBookingProgress(guestData);
                document.getElementById('nextActions').innerHTML = formatNextActions(guestData);
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

                // Show content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('refreshBtn').disabled = false;

            } catch (error) {
                console.error('Dashboard error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    <div class="error">
                        <strong>⚠️ Error loading dashboard</strong>
                        <p style="margin-top: 10px;">${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9em; color: #666;">Make sure the Google Sheets API key is valid and the sheet is accessible.</p>
                    </div>
                `;
                document.getElementById('refreshBtn').disabled = false;
            }
        }

        // Refresh function
        function refreshDashboard() {
            document.getElementById('refreshBtn').disabled = true;
            document.getElementById('refreshBtn').textContent = '🔄 Refreshing...';
            initDashboard().finally(() => {
                document.getElementById('refreshBtn').textContent = '🔄 Refresh Data';
            });
        }

        // Initialize on load
        window.addEventListener('load', initDashboard);
    </script>
</body>
